<header class="header header--private">
  <div class="brand">
    <div class="brand__logo">LC</div>
    <div>
      <p class="brand__eyebrow">Sesión iniciada</p>
      <h1 class="brand__title">Lemoncode Lab</h1>
    </div>
  </div>

  @if (auth.isLogged()) {
    <div class="session">
      <span class="session__user">Hola {{ auth.getUsername() }} !!</span>
      <button mat-raised-button color="primary" type="button" (click)="logout()">Salir</button>
    </div>
  }
</header>
