<section class="page-card gallery-card">
  <div class="gallery-card__intro">
    <app-page-intro
      title="Galería"
      subtitle="Miniaturas, imagen seleccionada y control manual/automático."
    ></app-page-intro>
  </div>

  <app-gallery-controls
    [isFirstPhoto]="isFirstPhoto"
    [isLastPhoto]="isLastPhoto"
    [isPlaying]="isPlaying()"
    (previousClick)="previous()"
    (nextClick)="next()"
    (increaseClick)="increase()"
    (decreaseClick)="decrease()"
    (playClick)="play()"
    (stopClick)="stop()"
  ></app-gallery-controls>

  <div class="gallery-selected">
    <div class="gallery-selected__media" [style.transform]="'scale(' + zoom() + ')'">
      <img rotate="0" step="15" [src]="selectedPhoto().src" [alt]="selectedPhoto().title" />
    </div>
  </div>

  <app-gallery-thumbnails
    [items]="pagedPhotos()"
    [selectedIndex]="selectedIndex()"
    (selectIndex)="selectPhoto($event)"
  ></app-gallery-thumbnails>

  <app-gallery-pagination
    [page]="thumbnailsPage()"
    [totalPages]="thumbnailsTotalPages()"
    [canGoPrevious]="canGoPreviousThumbnailsPage"
    [canGoNext]="canGoNextThumbnailsPage"
    (previousClick)="previousThumbnailsPage()"
    (nextClick)="nextThumbnailsPage()"
  ></app-gallery-pagination>
</section>
