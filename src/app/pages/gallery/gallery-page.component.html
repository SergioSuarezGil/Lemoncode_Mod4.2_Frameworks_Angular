<section class="page-card gallery-card">
  <div class="gallery-card__intro">
    <h2>Galería</h2>
    <p>Miniaturas, imagen seleccionada y control manual/automático.</p>
  </div>

  <div class="gallery-selected">
    <img
      [src]="selectedPhoto().src"
      [alt]="selectedPhoto().title"
      [style.transform]="'scale(' + zoom() + ')'"
    />
  </div>

  <div class="gallery-grid">
    @for (photo of photos; track photo.id; let i = $index) {
      <button
        class="gallery-tile"
        type="button"
        [class.gallery-tile--active]="i === selectedIndex()"
        (click)="selectPhoto(i)"
      >
        <img [src]="photo.src" [alt]="photo.title" />
        <span>{{ photo.title }}</span>
      </button>
    }
  </div>

  <div class="gallery-controls">
    <button mat-stroked-button type="button" (click)="previous()" [disabled]="isFirstPhoto">
      Anterior
    </button>
    <button mat-stroked-button type="button" (click)="next()" [disabled]="isLastPhoto">
      Siguiente
    </button>
    <button mat-stroked-button type="button" (click)="increase()">Aumentar</button>
    <button mat-stroked-button type="button" (click)="decrease()">Disminuir</button>

    @if (!isPlaying()) {
      <button mat-raised-button color="primary" type="button" (click)="play()">Play</button>
    }

    @if (isPlaying()) {
      <button mat-raised-button type="button" (click)="stop()">Stop</button>
    }
  </div>
</section>
