<h2 mat-dialog-title>Confirmar borrado</h2>

<div mat-dialog-content>
  <p>¿Seguro que quieres borrar el usuario {{ data.userLabel }}?</p>
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
  <button class="delete-confirm__delete" mat-flat-button type="button" (click)="confirm()">Borrar</button>
</div>
