<div class="gallery-grid">
  @for (item of items; track item.photo.id) {
    <button
      class="gallery-tile"
      type="button"
      [class.gallery-tile--active]="item.index === selectedIndex"
      (click)="selectIndex.emit(item.index)"
    >
      <img [src]="item.photo.src" [alt]="item.photo.title" />
      <span>{{ item.photo.title }}</span>
    </button>
  }
</div>
